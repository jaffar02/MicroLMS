server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # 👇 Crucial line: Fallback to index.html if the file doesn't exist on disk
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets like images/js/css to speed up loads
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}